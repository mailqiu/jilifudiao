<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图层定制处理服务</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; }
        .section { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        /* 支付区域优化 */
        #paymentArea { display: none; text-align: center; border: 2px dashed #3498db; padding: 20px; border-radius: 10px; margin-top: 20px; background: #fafafa; }
        
        /* 二维码容器：增加点击提示动画 */
        .qr-link { text-decoration: none; display: inline-block; transition: transform 0.2s; }
        .qr-link:active { transform: scale(0.95); }
        
        .qr-img { 
            max-width: 200px; 
            width: 100%; 
            height: auto; /* 自动高度，严禁变形 */
            display: block; 
            margin: 10px auto; 
            border: 5px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .qr-tip { font-size: 13px; color: #3498db; font-weight: bold; margin-bottom: 5px; animation: blink 2s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: #27ae60; color: white; }
        .price-box { background: #e8f4fd; padding: 15px; border-radius: 8px; text-align: center; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>图层定制处理</h2>
    <form id="orderForm">
        <div class="section"><label>1. 上传图片 (5元/张)</label><input type="file" id="fileInput" multiple required onchange="updateTotal()"></div>
        <div class="section"><label>2. 哪些图层需要【整体凸起】？</label><input type="text" id="raiseLayer" placeholder="如图：背景、人物" required></div>
        <div class="section"><label>3. 哪些图层需要【勾边浮雕】？</label><input type="text" id="strokeLayer" placeholder="如图：文字、边框" required></div>
        <div class="section"><label>4. 您的接收邮箱</label><input type="email" id="userEmail" placeholder="用于发送成品" required></div>

        <div class="price-box">应付总计：<span style="color:var(--danger); font-size:24px;">¥ <span id="totalPrice">0</span></span></div>
        <button type="button" id="submitStep1" class="btn btn-primary" onclick="showPayment()">核对信息并去支付</button>

        <div id="paymentArea">
            <p class="qr-tip">👇 点击下方图片放大，长按识别支付</p>
            <a href="qr.jpg" target="_blank" class="qr-link">
                <img src="qr.jpg" class="qr-img" alt="点击放大支付二维码">
            </a>
            
            <div style="margin-top:20px;">
                <label>支付完成后，输入订单号【后4位】</label>
                <input type="text" id="tradeNo" placeholder="核对款项用" maxlength="4">
            </div>
            <button type="button" id="finalBtn" class="btn btn-success" onclick="finalSubmit()">我已支付，提交订单</button>
        </div>
    </form>
</div>

<script>
    function updateTotal() {
        const count = document.getElementById('fileInput').files.length;
        document.getElementById('totalPrice').innerText = count * 5;
    }

    function showPayment() {
        if (document.getElementById('fileInput').files.length === 0) return alert("请先上传文件");
        if (!document.getElementById('userEmail').value) return alert("请填写接收邮箱");
        document.getElementById('submitStep1').style.display = 'none';
        document.getElementById('paymentArea').style.display = 'block';
    }

    async function finalSubmit() {
        const btn = document.getElementById('finalBtn');
        const tradeNo = document.getElementById('tradeNo').value;
        if (tradeNo.length < 4) return alert("请填写支付单号后4位");

        btn.disabled = true;
        btn.innerText = "发送中，请稍候...";

        const formData = new FormData();
        const files = document.getElementById('fileInput').files;
        for (let i = 0; i < files.length; i++) { formData.append('files', files[i]); }
        formData.append('raiseLayer', document.getElementById('raiseLayer').value);
        formData.append('strokeLayer', document.getElementById('strokeLayer').value);
        formData.append('userEmail', document.getElementById('userEmail').value);
        formData.append('tradeNo', tradeNo);
        formData.append('totalPrice', document.getElementById('totalPrice').innerText);

        try {
            const response = await fetch('/api/submit-order', { method: 'POST', body: formData });
            const result = await response.json();
            if (result.success) {
                alert("订单提交成功！请注意查收邮件。");
                location.reload();
            } else {
                alert("失败：" + (result.error || "接口异常"));
                btn.disabled = false;
                btn.innerText = "我已支付，提交订单";
            }
        } catch (error) {
            alert("提交超时，但后端可能已在处理，请检查邮箱");
            btn.disabled = false;
            btn.innerText = "我已支付，提交订单";
        }
    }
</script>
</body>
</html>
